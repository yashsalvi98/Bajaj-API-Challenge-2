[build]
  command = "npm --prefix frontend install && npm --prefix frontend run build && npm --prefix backend install"
  publish = "frontend/dist"
  functions = "backend/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
